name: Build Android APK (Release)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Regenerate Gradle Wrapper
        run: |
          # Remove potentially corrupt wrapper files
          rm -f gradle/wrapper/gradle-wrapper.jar
          rm -f gradlew
          rm -f gradlew.bat
          
          # Download and extract Gradle
          GRADLE_VERSION="9.3.1"
          wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
          unzip -q gradle-${GRADLE_VERSION}-bin.zip
          
          # Generate wrapper using the downloaded Gradle
          ./gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version ${GRADLE_VERSION}
          
          # Clean up
          rm -rf gradle-${GRADLE_VERSION} gradle-${GRADLE_VERSION}-bin.zip

      - name: Decode Release Keystore
        run: |
          if [ -f release.keystore.base64 ]; then
            echo "Decoding release.keystore.base64 to release.keystore..."
            base64 -d release.keystore.base64 > release.keystore
          else
            echo "release.keystore.base64 not found. Fallback to default behavior."
          fi

      - name: Set up local environments
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          fi
          touch local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: varotra-release-apk
          path: app/build/outputs/apk/release/*.apk
