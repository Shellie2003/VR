name: Android Release Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Regenerate Gradle Wrapper
        run: gradle wrapper

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create empty .env file
        run: touch .env

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is missing or empty!"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.jks

      - name: Verify Keystore Alias (Diagnostic)
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "=== Keystore Content Diagnostic ==="
          if [ -f app/release.jks ]; then
            keytool -list -v -keystore app/release.jks -storepass "$STORE_PASSWORD" | grep -i "Alias" || echo "Could not parse keystore"
          else
            echo "Keystore file not found!"
          fi
          echo "==================================="

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build and Sign Release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Rename APK to varotra.apk
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/varotra.apk
            echo "Successfully renamed app-release.apk to varotra.apk"
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/varotra.apk
            echo "Successfully renamed app-release-unsigned.apk to varotra.apk"
          else
            echo "No APK found to rename! Checking directory..."
            ls -la app/build/outputs/apk/release/ || true
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/varotra.apk
