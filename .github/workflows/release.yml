name: Build & Sign Android Release

on:
  push:
    tags:
      - 'v*' # Triggers on release tags like v1.0, v1.0.1
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Signed Release APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle
        run: chmod +x gradlew

      - name: Decrypt and Restore Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not defined in GitHub."
            exit 1
          fi
          # Decode the keystore and write it to the root of the project as configured in build.gradle.kts
          echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks

      - name: Build Release Bundle & APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: "vadr"
          KEYSTORE_PATH: "my-upload-key.jks"
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload Signed AAB (App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release (Optional - tag triggers only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
